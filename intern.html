<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Intern Dashboard | IMS</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --success: #10b981; --danger: #f43f5e; --sidebar: #1e1b4b; --bg: #f3f4f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding: 30px 20px; position: sticky; top: 0; height: 100vh; }
        .main { flex: 1; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        #clock { font-size: 40px; font-weight: 800; color: var(--primary); margin: 15px 0; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 16px; }
        .btn-in { background: var(--success); color: white; }
        .btn-out { background: var(--danger); color: white; display: none; }
        #loader { position: fixed; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .status-badge { padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: 700; background: #eee; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner">Loading...</div></div>

<aside class="sidebar">
    <h2>IMS PRO</h2>
    <div style="margin-top:40px;">
        <p style="color:#94a3b8; font-size:12px;">MAIN MENU</p><br>
        <div style="color:white;"><i class="fas fa-home"></i> Dashboard</div>
    </div>
</aside>

<main class="main">
    <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
        <h1 id="user-name">Welcome</h1>
        <div id="status-box" class="status-badge">Offline</div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 350px; gap:25px;">
        <div>
            <div class="card">
                <h3>My Attendance History</h3>
                <p style="color:#64748b;">Daily logs will appear here.</p>
            </div>
        </div>

        <div class="card">
            <p>LIVE TIME</p>
            <div id="clock">00:00:00</div>
            <div id="timer-display" style="color:var(--success); font-weight:700; margin-bottom:15px; display:none;">Active Session...</div>
            
            <button id="btnIn" class="btn btn-in" onclick="markAttendance('in')">PUNCH IN</button>
            <button id="btnOut" class="btn btn-out" onclick="askReport()">PUNCH OUT</button>
            
            <p id="msg" style="margin-top:15px; font-size:12px; color:#94a3b8;"></p>
        </div>
    </div>
</main>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxKzfrVrpBoNY6iMUEPwf2noorCgAUus-wCPspDjV3jqb4l-1peItRMJD08sI_SMhkM/exec";
    const user = JSON.parse(localStorage.getItem("user"));
    if(!user) window.location.href = "index.html";

    function getTodayKey() {
        const now = new Date();
        return `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
    }

    document.getElementById('user-name').innerText = `Hello, ${user.name} 👋`;
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

    function loadDashboard() {
        document.getElementById('loader').style.display = 'flex';
        const cb = 'jsonp_' + Date.now();
        window[cb] = function(data) {
            document.getElementById('loader').style.display = 'none';
            if(data.status === "success") {
                const todayRecord = data.history[getTodayKey()];
                syncUI(todayRecord);
            }
            delete window[cb];
        };
        const s = document.createElement('script');
        s.src = `${SCRIPT_URL}?action=getHistory&id=${user.id}&callback=${cb}`;
        document.body.appendChild(s);
    }

    function syncUI(record) {
        const bIn = document.getElementById('btnIn');
        const bOut = document.getElementById('btnOut');
        const st = document.getElementById('status-box');

        if(record) {
            if(record.out !== "Working") {
                bIn.style.display = "none";
                bOut.style.display = "block";
                bOut.disabled = true;
                bOut.innerText = "SHIFT COMPLETED";
                st.innerText = "Offline";
            } else {
                bIn.style.display = "none";
                bOut.style.display = "block";
                st.innerText = "Online / Working";
                st.style.background = "#dcfce7";
                st.style.color = "#15803d";
            }
        } else {
            bIn.style.display = "block";
            bOut.style.display = "none";
        }
    }

    function markAttendance(type, report = "") {
        document.getElementById('loader').style.display = 'flex';
        const cb = 'jsonp_' + Date.now();
        window[cb] = function(data) {
            document.getElementById('loader').style.display = 'none';
            Swal.fire(data.status === "success" ? 'Success' : 'Error', data.message, data.status);
            if(data.status === "success") loadDashboard();
            delete window[cb];
        };
        const s = document.createElement('script');
        s.src = `${SCRIPT_URL}?action=attendance&type=${type}&id=${user.id}&name=${encodeURIComponent(user.name)}&report=${encodeURIComponent(report)}&callback=${cb}`;
        document.body.appendChild(s);
    }

    async function askReport() {
        const { value: text } = await Swal.fire({
            title: 'Work Report',
            input: 'textarea',
            inputPlaceholder: 'What did you do today?',
            inputValidator: (v) => !v && 'Please write a report!'
        });
        if (text) markAttendance('out', text);
    }

    function logout() { localStorage.clear(); window.location.href = "index.html"; }
    loadDashboard();
</script>
</body>
</html>
<!-- intern.html carry all intern side functionalities such as setting password for new interns, viewing attendance history, and other intern-specific features. It is designed to provide a user-friendly interface for interns to manage their attendance and view their work reports. The page includes a sidebar for navigation, a main section for displaying content, and uses JavaScript to handle interactions and communicate with the server via JSONP requests. -->
