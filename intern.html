<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Pro Intern Dashboard | IMS</title>   <!--Astha Download This all Files(Code) in Locally for permanant use This Section -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.8);
            --primary: #6366f1;
            --success: #10b981;
            --danger: #f43f5e;
            --sidebar: #1e1b4b;
            --bg: #f3f4f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); display: flex; color: #1f2937; min-height: 100vh; }

        #loader {
            position: fixed; width: 100%; height: 100%; background: rgba(255,255,255,0.9);
            z-index: 10000; display: none; justify-content: center; align-items: center; flex-direction: column;
        }
        .loading-orbit {
            width: 60px; height: 60px; border: 4px solid #ddd; border-top: 4px solid var(--primary);
            border-radius: 50%; animation: orbit 1s linear infinite;
        }
        @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .sidebar { width: 280px; background: var(--sidebar); color: white; padding: 30px 20px; position: sticky; top: 0; height: 100vh; box-shadow: 4px 0 10px rgba(0,0,0,0.1); }
        .sidebar h2 { font-size: 24px; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; color: #a5b4fc; }
        .nav-item { padding: 14px 18px; display: flex; align-items: center; gap: 12px; color: #94a3b8; text-decoration: none; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; cursor: pointer; }
        .nav-item.active, .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }

        .main { flex: 1; padding: 40px; max-width: 1200px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .user-profile { background: white; padding: 10px 20px; border-radius: 50px; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        .grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: 25px; }
        .card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 24px; padding: 30px; border: 1px solid white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); margin-bottom: 20px; }

        #clock { font-size: 48px; font-weight: 800; color: var(--primary); margin: 20px 0; font-variant-numeric: tabular-nums; }
        .btn-stack { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .btn { padding: 16px; border: none; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-in { background: var(--success); color: white; }
        .btn-out { background: var(--danger); color: white; }
        .btn-slip { background: var(--primary); color: white; margin-top: 15px; width: 100%; }
        .btn:disabled { background: #e5e7eb !important; color: #9ca3af !important; cursor: not-allowed; transform: none !important; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-label { font-weight: 700; color: #64748b; font-size: 12px; text-transform: uppercase; text-align: center; padding-bottom: 10px; }
        .day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 14px; background: white; font-size: 14px; position: relative; cursor: pointer; transition: 0.2s; border: 1px solid #f3f4f6; }
        .day.today { border: 2px solid var(--primary); font-weight: 800; }
        .day.present { background: #ecfdf5; color: var(--success); border-color: #10b981; }
        
        .tooltip { 
            visibility: hidden; position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
            background: #1f2937; color: white; padding: 10px; border-radius: 8px; width: 150px;
            font-size: 11px; z-index: 100; opacity: 0; transition: 0.3s; box-shadow: 0 10px 15px rgba(0,0,0,0.2);
        }
        .day:hover .tooltip { visibility: visible; opacity: 1; }
    </style>
</head>
<body>

<div id="loader"><div class="loading-orbit"></div><p style="margin-top:20px; font-weight:600;">Processing Data...</p></div>

<aside class="sidebar">
    <h2><i class="fas fa-bolt"></i> IMS PRO</h2>
    <div class="nav-item active"><i class="fas fa-home"></i> Dashboard</div>
    <div class="nav-item" onclick="downloadSlip()"><i class="fas fa-file-invoice-dollar"></i> Salary Slip</div>
    <div class="nav-item" onclick="logout()" style="margin-top: 50vh; color: #fca5a5;"><i class="fas fa-sign-out-alt"></i> Logout</div>
</aside>

<main class="main">
    <div class="top-bar">
        <div>
            <h1 id="user-name">Welcome</h1>
            <p id="today-date" style="color: #64748b;"></p>
        </div>
        <div class="user-profile">
            <span id="status-dot" style="width: 10px; height: 10px; border-radius: 50%; background: #9ca3af;"></span>
            <span id="status-text" style="font-weight: 600; font-size: 14px;">Offline</span>
        </div>
    </div>

    <div class="grid">
        <div class="left-col">
            <div class="card">
                <div class="cal-header" style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <h3 id="current-month">Month Year</h3>
                    <span style="font-size:12px; color:var(--success); font-weight:700;">Rate: ₹500/8hr</span>
                </div>
                <div class="calendar-grid" id="calendar-body"></div>
            </div>
            
            <div class="card" style="text-align:center;">
                <h3>Salary & Payroll</h3>
                <p style="font-size:14px; color:#64748b; margin-top:10px;">Total Estimated Earnings this Month</p>
                <h2 id="total-salary-display" style="color:var(--success); margin:10px 0;">₹0.00</h2>
                <button class="btn btn-slip" onclick="downloadSlip()"><i class="fas fa-download"></i> Download PDF Payslip</button>
            </div>
        </div>

        <div class="card" style="text-align: center; height: fit-content;">
            <p style="text-transform: uppercase; font-weight: 700; color: #94a3b8; font-size: 12px; letter-spacing: 1px;">Live Session</p>
            <div id="clock">00:00:00</div>
            <div class="btn-stack">
                <button id="btnIn" class="btn btn-in" onclick="markAttendance('in')">
                    <i class="fas fa-sign-in-alt"></i> Punch In
                </button>
                <button id="btnOut" class="btn btn-out" onclick="markAttendance('out')">
                    <i class="fas fa-sign-out-alt"></i> Punch Out
                </button>
            </div>
            <p id="footer-msg" style="margin-top: 20px; font-size: 12px; color: #94a3b8;">Standard shift: 8 Hours</p>
        </div>
    </div>
</main>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwy-zM_kG1PA3JvRZ0a77FIwXaid2gBw2NJv1buXh8yb2CQjm-jYjSGjekPWNG-sQOI/exec";
    const user = JSON.parse(localStorage.getItem("user"));
    if(!user) window.location.href = "index.html";

    let globalHistory = {}; // PDF ke liye data store karega Global variable banaya hai taaki multiple functions access kar sakein

    document.getElementById('user-name').innerText = `Hello, ${user.name} 👋`;
    document.getElementById('today-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

    function loadDashboard() {
        document.getElementById('loader').style.display = 'flex';
        const cb = 'jsonp_' + Date.now();
        window[cb] = function(data) {
            document.getElementById('loader').style.display = 'none';
            if(data.status === "success") {
                globalHistory = data.history;
                renderCalendar(data.history);
                syncButtonState(data.history);
                calculateTotalSalary(data.history);
            }
            delete window[cb];
        };
        const s = document.createElement('script');
        s.src = `${SCRIPT_URL}?action=getHistory&id=${user.id}&callback=${cb}`;
        document.body.appendChild(s);
    }

    function calculateTotalSalary(history) {
    let total = 0;
    if (history && Object.keys(history).length > 0) {
        Object.values(history).forEach(day => {
            // Salary ko number mein convert karke sum karein
            let amt = parseFloat(day.salary);
            if (!isNaN(amt)) {
                total += amt;
            }
        });
    }
    const display = document.getElementById('total-salary-display');
    if (display) {
        display.innerText = `₹${total.toFixed(2)}`;
    }
}

    function renderCalendar(history) {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        document.getElementById('current-month').innerText = now.toLocaleString('default', { month: 'long', year: 'numeric' });

        const cal = document.getElementById('calendar-body');
        cal.innerHTML = "";
        ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => cal.innerHTML += `<div class="day-label">${d}</div>`);

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for(let i=0; i<firstDay; i++) cal.innerHTML += `<div></div>`;

        for(let d=1; d<=daysInMonth; d++) {
            let dk = `${String(d).padStart(2,'0')}/${String(month+1).padStart(2,'0')}/${year}`;
            let record = history[dk];
            let isToday = (d === now.getDate()) ? 'today' : '';
            let isPresent = record ? 'present' : '';
            
            let tooltip = record ? 
                `<div class="tooltip"><b>Duration:</b> ${record.duration || '0h'}<br><b>Earned:</b> ₹${record.salary || '0'}</div>` : 
                `<div class="tooltip">No Data</div>`;

            cal.innerHTML += `<div class="day ${isToday} ${isPresent}">${d}${tooltip}</div>`;
        }
    }

function downloadSlip() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // Header
    doc.setFont("helvetica", "bold");
    doc.setFontSize(20);
    doc.text("Company Name", 105, 15, { align: "center" });
    doc.setFontSize(12);
    doc.setFont("helvetica", "normal");
    doc.text(`Salary Slip for February 2026`, 105, 22, { align: "center" });
    doc.line(10, 25, 200, 25);

    // Info Grid
    doc.setFontSize(10);
    doc.text(`Name: ${user.name}`, 15, 35);
    doc.text(`Designation: Intern`, 15, 42);
    doc.text(`Employee ID: ${user.id}`, 15, 49);
    doc.text(`Department: Technology`, 110, 35);
    doc.text(`Bank Name: N/A`, 110, 42);
    doc.text(`Account No: N/A`, 110, 49);
    doc.line(10, 55, 200, 55);

    // Calculate Total Earnings
    let totalE = 0;
    Object.values(globalHistory).forEach(day => {
        totalE += parseFloat(day.salary || 0);
    });

    // Main Table as per image
    doc.autoTable({
        startY: 60,
        head: [['Earnings', 'Amount', 'Deductions', 'Amount']],
        body: [
            ['Basic (Prorata)', totalE.toFixed(2), 'Professional Tax', '0.00'],
            ['Dearness Allowance', '0.00', 'TDS', '0.00'],
            ['House Rent Allowance', '0.00', 'EPF', '0.00'],
            ['Conveyance Allowance', '0.00', '', ''],
            ['Medical Allowance', '0.00', '', ''],
            ['Special Allowance', '0.00', '', '']
        ],
        theme: 'grid',
        headStyles: { fillColor: [255, 255, 255], textColor: [0, 0, 0], fontStyle: 'bold' },
        styles: { fontSize: 9 }
    });

    // Net Salary Footer
    const finalY = doc.lastAutoTable.finalY;
    doc.autoTable({
        startY: finalY,
        body: [
            ['Gross Salary', totalE.toFixed(2), 'Total Deduction', '0.00'],
            ['Net Salary', `INR ${totalE.toFixed(2)}`, '', '']
        ],
        theme: 'grid',
        styles: { fontStyle: 'bold', fontSize: 10 }
    });

    doc.setFontSize(8);
    doc.text("Computer generated slip - No signature required", 105, doc.lastAutoTable.finalY + 15, { align: "center" });
    doc.save(`SalarySlip_${user.id}.pdf`);
}

    function syncButtonState(history) {
        const now = new Date();
        const todayKey = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
        const bIn = document.getElementById('btnIn'), bOut = document.getElementById('btnOut'), dot = document.getElementById('status-dot'), txt = document.getElementById('status-text');

        if (history[todayKey]) {
            bIn.disabled = true;
            bIn.innerHTML = `<i class="fas fa-check-circle"></i> Punch In Done`;
            dot.style.background = "var(--success)";
            txt.innerText = "Working Online";

            if (history[todayKey].out && history[todayKey].out !== "N/A" && history[todayKey].out !== "") {
                bOut.disabled = true;
                bOut.innerHTML = `<i class="fas fa-flag-checkered"></i> Attendance Submitted`;
                dot.style.background = "#9ca3af";
                txt.innerText = "Shift Ended";
            } else {
                bOut.disabled = false;
            }
        } else {
            bIn.disabled = false;
            bOut.disabled = true;
            dot.style.background = "var(--danger)";
            txt.innerText = "Awaiting Punch-In";
        }
    }
        // This functin need improvement and modify it in future
    function markAttendance(type) {
        document.getElementById('loader').style.display = 'flex';
        const cb = 'jsonp_' + Date.now();
        window[cb] = function(data) {
            document.getElementById('loader').style.display = 'none';
            Swal.fire({
                icon: data.status === "success" ? 'success' : 'warning',
                title: data.status === "success" ? 'Done!' : 'Notice',
                text: data.message,
                confirmButtonColor: '#6366f1'
            });
            // this function calls the loadDashboard function to refresh the dashboard data and update the UI based on the latest attendance status. After marking attendance (either punch in or punch out), it fetches the updated history and re-renders the calendar, syncs the button states, and recalculates the total salary. This ensures that the intern sees real-time updates without needing to manually refresh the page.
            loadDashboard();
            delete window[cb];
        };
        const s = document.createElement('script');//this line creates a new script element that will be used to make a JSONP request to the server. JSONP is a technique used to overcome cross-origin restrictions in web browsers by dynamically adding a script tag with a source URL that includes a callback function. In this case, the script's source URL is constructed with the action (attendance), type (in or out), user ID, user name, and the callback function name. When the server responds, it will execute the callback function with the response data, allowing the client-side code to handle the response accordingly.
        s.src = `${SCRIPT_URL}?action=attendance&type=${type}&id=${user.id}&name=${encodeURIComponent(user.name)}&callback=${cb}`;
        document.body.appendChild(s);
    }
    // this function is use for logout and clear the local storage data and redirect to login page
    function logout() { localStorage.clear(); window.location.href = "index.html"; }
    loadDashboard();//this function is called when the intern dashboard page loads. It fetches the attendance history and salary data for the logged-in intern and updates the calendar, button states, and total salary display accordingly. This ensures that the intern sees their current attendance status and earnings as soon as they access the dashboard.
</script>
</body>
</html>
