<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HR Master Pro | IMS</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar: #0f172a; --primary: #6366f1; --success: #10b981; --bg: #f8fafc; --accent: #818cf8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar); height: 100vh; color: white; padding: 25px; position: sticky; top: 0; }
        .sidebar h2 { color: var(--accent); margin-bottom: 40px; font-size: 22px; }
        .nav-link { padding: 14px; color: #94a3b8; text-decoration: none; display: block; border-radius: 10px; margin-bottom: 10px; transition: 0.3s; }
        .nav-link.active { background: rgba(255,255,255,0.1); color: white; }

        .main { flex: 1; padding: 40px; }
        
        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 15px; }
        .stat-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        /* Layout Grid */
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }

        input, .search-bar { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; font-size: 14px; }
        .btn-reg { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-reg:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3); }

        /* Table Styling */
        .table-container { max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; color: #64748b; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; position: sticky; top: 0; background: white; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        
        /* Badges */
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .badge-working { background: #fef9c3; color: #a16207; }
        .badge-done { background: #dcfce7; color: #15803d; }
        .badge-pending { background: #fee2e2; color: #b91c1c; }
        .badge-active { background: #e0e7ff; color: #4338ca; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>IMS ADMIN</h2>
        <nav>
            <a href="#" class="nav-link active"><i class="fas fa-chart-line"></i> HR Dashboard</a>
            <a href="javascript:void(0)" onclick="logout()" class="nav-link" style="margin-top: 50vh; color: #fda4af;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </aside>

    <main class="main">
        <header style="margin-bottom: 30px;">
            <h1 id="hr-welcome">Dashboard</h1>
            <p style="color: #64748b;">Manage interns and track daily attendance</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon" style="background: #e0e7ff; color: #6366f1;"><i class="fas fa-user-graduate"></i></div>
                <div>
                    <p style="font-size: 12px; color: #64748b;">Total Interns</p>
                    <h2 id="total-count">0</h2>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #dcfce7; color: #10b981;"><i class="fas fa-user-check"></i></div>
                <div>
                    <p style="font-size: 12px; color: #64748b;">Present Today</p>
                    <h2 id="present-count">0</h2>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="left-col">
                <div class="card">
                    <h3><i class="fas fa-user-plus"></i> New Intern</h3><br>
                    <input type="text" id="name" placeholder="Full Name">
                    <input type="email" id="email" placeholder="Email Address">
                    <button class="btn-reg" onclick="register()">Create Account</button>
                </div>

                <div class="card">
                    <h3><i class="fas fa-list"></i> Intern List</h3>
                    <input type="text" id="searchIntern" placeholder="Search Interns..." onkeyup="filterInterns()" style="margin-top:15px;">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr><th>ID</th><th>Name</th><th>Status</th></tr>
                            </thead>
                            <tbody id="intern-list-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3><i class="fas fa-clock"></i> Live Attendance (Today)</h3>
                    <input type="text" id="searchAtt" placeholder="Search attendance..." style="width: 200px; margin-bottom: 0;" onkeyup="filterAttendance()">
                </div>
                <div class="table-container" style="max-height: 700px;">
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Name</th><th>Time In</th><th>Status</th></tr>
                        </thead>
                        <tbody id="att-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwy-zM_kG1PA3JvRZ0a77FIwXaid2gBw2NJv1buXh8yb2CQjm-jYjSGjekPWNG-sQOI/exec";
        const user = JSON.parse(localStorage.getItem("user"));
        
        if(!user || user.role !== "HR") window.location.href = "index.html";
        document.getElementById('hr-welcome').innerText = `Welcome back, ${user.name} 👋`;

        function loadDashboard() {
            const cb = 'jsonp_' + Date.now();
            window[cb] = function(data) {
                if(data.status === "success") {
                    // Update Stats
                    document.getElementById('total-count').innerText = data.totalInterns;
                    document.getElementById('present-count').innerText = data.attendance.length;
                    
                    // Update Attendance Table
                    const attBody = document.getElementById('att-body');
                    attBody.innerHTML = "";
                    data.attendance.forEach(row => {
                        let isWorking = row.out === "Working";
                        attBody.innerHTML += `<tr>
                            <td><b>${row.id}</b></td>
                            <td>${row.name}</td>
                            <td>${row.in}</td>
                            <td><span class="badge ${isWorking ? 'badge-working' : 'badge-done'}">${isWorking ? 'Active' : 'Out: '+row.out}</span></td>
                        </tr>`;
                    });

                    // Update Intern List Table
                    const internBody = document.getElementById('intern-list-body');
                    internBody.innerHTML = "";
                    data.interns.forEach(intern => {
                        let statusClass = intern.status === "Active" ? "badge-active" : "badge-pending";
                        internBody.innerHTML += `<tr>
                            <td>${intern.id}</td>
                            <td>${intern.name}</td>
                            <td><span class="badge ${statusClass}">${intern.status}</span></td>
                        </tr>`;
                    });
                }
                delete window[cb];
            };
            const s = document.createElement('script');
            s.src = `${SCRIPT_URL}?action=getHRDashboard&callback=${cb}`;
            document.body.appendChild(s);
        }

        function filterAttendance() {
            const input = document.getElementById("searchAtt").value.toUpperCase();
            const rows = document.getElementById("att-body").getElementsByTagName("tr");
            for (let i = 0; i < rows.length; i++) {
                const nameCol = rows[i].getElementsByTagName("td")[1];
                if (nameCol) {
                    const text = nameCol.textContent || nameCol.innerText;
                    rows[i].style.display = text.toUpperCase().indexOf(input) > -1 ? "" : "none";
                }
            }
        }

        function filterInterns() {
            const input = document.getElementById("searchIntern").value.toUpperCase();
            const rows = document.getElementById("intern-list-body").getElementsByTagName("tr");
            for (let i = 0; i < rows.length; i++) {
                const nameCol = rows[i].getElementsByTagName("td")[1];
                if (nameCol) {
                    const text = nameCol.textContent || nameCol.innerText;
                    rows[i].style.display = text.toUpperCase().indexOf(input) > -1 ? "" : "none";
                }
            }
        }

        function register() {
            const n = document.getElementById('name').value, e = document.getElementById('email').value;
            if(!n || !e) return Swal.fire('Error', 'Fill all fields', 'error');
            
            Swal.fire({ title: 'Processing...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            const cb = 'jsonp_' + Date.now();
            window[cb] = function(data) {
                Swal.close();
                Swal.fire('Intern Created!', `ID: ${data.generatedId}`, 'success');
                document.getElementById('name').value = ""; document.getElementById('email').value = "";
                loadDashboard();
                delete window[cb];
            };
            const s = document.createElement('script');
            s.src = `${SCRIPT_URL}?action=createIntern&name=${encodeURIComponent(n)}&email=${encodeURIComponent(e)}&callback=${cb}`;
            document.body.appendChild(s);
        }

        function logout() { localStorage.clear(); window.location.href = "index.html"; }
        
        loadDashboard();
        setInterval(loadDashboard, 30000); // Auto refresh
    </script>
</body>
</html>
