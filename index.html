<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>IMS | Secure Access</title><!-- Change this Heading according to Project Name -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f3f4f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* --- Full Screen Loader --- */
        #page-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(5px);
            z-index: 10000; display: none; justify-content: center; align-items: center;
            flex-direction: column;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { margin-top: 15px; font-weight: 600; color: var(--primary); letter-spacing: 1px; }

        .container {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 40px; border-radius: 24px; width: 100%; max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); text-align: center;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        h2 { margin-bottom: 10px; color: #1f2937; }
        p { color: #64748b; font-size: 14px; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #4b5563; margin-bottom: 5px; }
        input {
            width: 100%; padding: 12px; border: 1.5px solid #e5e7eb;
            border-radius: 12px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        .btn {
            width: 100%; padding: 14px; background: var(--primary);
            color: white; border: none; border-radius: 12px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: #4f46e5; transform: translateY(-2px); }

        .toggle-link { margin-top: 20px; font-size: 14px; color: var(--primary); cursor: pointer; font-weight: 600; }
        #set-pass-section { display: none; }
    </style>
</head>
<body>

<div id="page-loader">
    <div class="spinner"></div>
    <div class="loader-text">Verifying Credentials...</div>
</div>

<div class="container" id="login-section">
    <h2>Welcome Back</h2>
    <p>Sign in to your dashboard</p>
    <div class="input-group">
        <label>User ID</label>
        <input type="text" id="l-uid" placeholder="Enter ID (e.g. INT101)">
    </div>
    <div class="input-group">
        <label>Password</label>
        <input type="password" id="l-pass" placeholder="Enter Password">
    </div>
    <button class="btn" onclick="login()">Sign In</button>
    <div class="toggle-link" onclick="toggleSection('set')">New Intern? Set Password</div>
</div>

<div class="container" id="set-pass-section">
    <h2>Set Password</h2>
    <p>Initialize your intern account</p>
    <div class="input-group">
        <label>Intern ID</label>
        <input type="text" id="s-uid" placeholder="Enter Generated ID">
    </div>
    <div class="input-group">
        <label>New Password</label>
        <input type="password" id="s-pass" placeholder="Create Password">
    </div>
    <button class="btn" onclick="setPassword()">Secure Account</button>
    <div class="toggle-link" onclick="toggleSection('login')">Back to Login</div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwy-zM_kG1PA3JvRZ0a77FIwXaid2gBw2NJv1buXh8yb2CQjm-jYjSGjekPWNG-sQOI/exec";
    const loader = document.getElementById('page-loader');

    function toggleSection(type) {
        document.getElementById('login-section').style.display = type === 'login' ? 'block' : 'none';
        document.getElementById('set-pass-section').style.display = type === 'set' ? 'block' : 'none';
    }

    async function login() {
        const id = document.getElementById('l-uid').value.trim();
        const pass = document.getElementById('l-pass').value;
        if(!id || !pass) return Swal.fire('Warning', 'All fields are mandatory', 'warning');

        loader.style.display = 'flex'; // Show Loader

        const hash = CryptoJS.SHA256(pass).toString();
        const cb = 'jsonp_' + Date.now();
        
        window[cb] = function(data) {
            loader.style.display = 'none'; // Hide Loader
            if(data.status === 'success') {
                localStorage.setItem("user", JSON.stringify(data));
                window.location.href = data.role === "HR" ? "hr.html" : "intern.html";
            } else {
                Swal.fire('Login Failed', 'Invalid ID or Password', 'error');
            }
            delete window[cb];
        };

        const s = document.createElement('script');
        s.src = `${SCRIPT_URL}?action=login&id=${id}&pass=${hash}&callback=${cb}`;
        document.body.appendChild(s);
    }function loadDashboard() {
    const cb = 'jsonp_' + Date.now();
    window[cb] = function(data) {
        if(data.status === "success") {
            document.getElementById('total-count').innerText = data.totalInterns || 0;
            document.getElementById('present-count').innerText = (data.attendance ? data.attendance.length : 0);
            
            // Attendance Table Update
            const attBody = document.getElementById('att-body');
            attBody.innerHTML = "";
            if (data.attendance && data.attendance.length > 0) {
                data.attendance.forEach(row => {
                    let isWorking = row.out === "Working";
                    attBody.innerHTML += `<tr>
                        <td><b>${row.id}</b></td>
                        <td>${row.name}</td>
                        <td>${row.in}</td>
                        <td><span class="badge ${isWorking ? 'badge-working' : 'badge-done'}">${isWorking ? 'Active' : 'Out: '+row.out}</span></td>
                    </tr>`;
                });
            } else {
                attBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Aaj kisi ne punch-in nahi kiya</td></tr>';
            }

            // Intern List Table Update
            const internBody = document.getElementById('intern-list-body');
            internBody.innerHTML = "";
            if (data.interns) {
                data.interns.forEach(intern => {
                    let statusClass = intern.status === "Active" ? "badge-active" : "badge-pending";
                    internBody.innerHTML += `<tr>
                        <td>${intern.id}</td>
                        <td>${intern.name}</td>
                        <td><span class="badge ${statusClass}">${intern.status}</span></td>
                    </tr>`;
                });
            }
        }
        delete window[cb];
    };
    const s = document.createElement('script');
    s.src = `${SCRIPT_URL}?action=getHRDashboard&callback=${cb}`;
    document.body.appendChild(s);
}

    async function setPassword() {
        const id = document.getElementById('s-uid').value.trim();
        const pass = document.getElementById('s-pass').value;
        if(!id || pass.length < 4) return Swal.fire('Warning', 'ID and 4+ char password required', 'warning');

        loader.style.display = 'flex'; // Show Loader
        document.querySelector('.loader-text').innerText = "Securing Your Account...";

        const hash = CryptoJS.SHA256(pass).toString();
        const cb = 'jsonp_' + Date.now();

        window[cb] = function(data) {
            loader.style.display = 'none'; // Hide Loader
            Swal.fire({
                title: data.status === 'success' ? 'Great!' : 'Oops!',
                text: data.message,
                icon: data.status,
                confirmButtonColor: '#6366f1'
            });
            if(data.status === 'success') toggleSection('login');
            delete window[cb];
        };

        const s = document.createElement('script');
        s.src = `${SCRIPT_URL}?action=setPassword&id=${id}&newPass=${hash}&callback=${cb}`;
        document.body.appendChild(s);
    }
</script>
</body>
</html>
